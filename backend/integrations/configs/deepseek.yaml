# DeepSeek Integration
# High-performance chat and code models at low cost

id: deepseek
name: DeepSeek
display_name: DeepSeek
description: DeepSeek Chat and Coder models - high performance at low cost
long_description: |
  DeepSeek provides high-quality language models at competitive pricing.
  Access DeepSeek Chat for general tasks and DeepSeek Coder for
  programming assistance. Uses an OpenAI-compatible API.

category: ai
tags:
  - llm
  - ai
  - deepseek
  - chat
  - code
  - low-cost

icon_url: /icons/deepseek.svg
color: "#4d6bfe"

# Authentication
auth:
  type: api_key
  fields:
    - name: api_key
      label: API Key
      type: password
      required: true
      help: |
        Get your API key from DeepSeek:
        1. Go to https://platform.deepseek.com/api_keys
        2. Click "Create new API key"
        3. Copy and paste the key here

# Actions
actions:
  chat_completion:
    name: chat_completion
    display_name: Chat Completion
    description: Generate text using DeepSeek models
    type: http

    method: POST
    url: "https://api.deepseek.com/v1/chat/completions"
    headers:
      Authorization: "Bearer {{auth.api_key}}"
      Content-Type: "application/json"
    body:
      model: "{{parameters.model}}"
      messages:
        - role: "user"
          content: "{{parameters.prompt}}"
      temperature: "{{parameters.temperature}}"
      max_tokens: "{{parameters.max_tokens}}"

    parameters:
      - name: prompt
        label: Prompt
        type: string
        required: true
        description: The prompt or question to send to the model
        supports_templates: true
      - name: model
        label: Model
        type: string
        required: false
        default: "deepseek-chat"
        enum:
          - deepseek-chat
          - deepseek-reasoner
        description: |
          Available models:
          - deepseek-chat: General-purpose chat model
          - deepseek-reasoner: Advanced reasoning model
      - name: temperature
        label: Temperature
        type: number
        required: false
        default: 0.7
        description: Creativity level (0-2, higher = more creative)
      - name: max_tokens
        label: Max Tokens
        type: integer
        required: false
        default: 1000
        description: Maximum length of the response

    response:
      mappings:
        text: "$.choices[0].message.content"
        model: "$.model"
        prompt_tokens: "$.usage.prompt_tokens"
        completion_tokens: "$.usage.completion_tokens"
        total_tokens: "$.usage.total_tokens"

  test_connection:
    name: test_connection
    display_name: Test Connection
    description: Verify API key is valid
    type: http

    method: GET
    url: "https://api.deepseek.com/v1/models"
    headers:
      Authorization: "Bearer {{auth.api_key}}"

    parameters: []

    response:
      mappings:
        models: "$.data"

# Metadata
version: "1.0.0"
documentation_url: https://platform.deepseek.com/docs
homepage_url: https://deepseek.com
is_enabled: true
supports_test_connection: true
