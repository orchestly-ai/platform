# Anthropic Integration
# Access Claude models for safe, helpful AI assistants

id: anthropic
name: Anthropic
display_name: Anthropic (Claude)
description: Generate text and chat completions using Claude models
long_description: |
  Connect to Anthropic's API to use Claude 3.5 Sonnet, Claude 3 Opus,
  and other Claude models. Known for being helpful, harmless, and honest.

category: ai
tags:
  - llm
  - ai
  - claude
  - text-generation
  - chat

icon_url: /icons/anthropic.svg
color: "#D4A27F"

# Authentication
auth:
  type: api_key
  fields:
    - name: api_key
      label: API Key
      type: password
      required: true
      help: |
        Get your API key from Anthropic:
        1. Go to https://console.anthropic.com/settings/keys
        2. Click "Create Key"
        3. Copy and paste the key here

# Actions
actions:
  chat_completion:
    name: chat_completion
    display_name: Chat Completion
    description: Generate a chat response using Claude models
    type: http

    method: POST
    url: "https://api.anthropic.com/v1/messages"
    headers:
      x-api-key: "{{auth.api_key}}"
      anthropic-version: "2023-06-01"
      Content-Type: "application/json"
    body:
      model: "{{parameters.model}}"
      max_tokens: "{{parameters.max_tokens}}"
      messages:
        - role: "user"
          content: "{{parameters.prompt}}"

    parameters:
      - name: prompt
        label: Prompt
        type: string
        required: true
        description: The prompt or question to send to Claude
        supports_templates: true
      - name: model
        label: Model
        type: string
        required: false
        default: "claude-3-5-sonnet-20241022"
        enum:
          - claude-3-5-sonnet-20241022
          - claude-3-opus-20240229
          - claude-3-sonnet-20240229
          - claude-3-haiku-20240307
        description: |
          Available models:
          - claude-3-5-sonnet: Best balance of speed and quality
          - claude-3-opus: Most capable, best for complex tasks
          - claude-3-haiku: Fastest, most cost-effective
      - name: max_tokens
        label: Max Tokens
        type: integer
        required: false
        default: 1024
        description: Maximum length of the response

    response:
      mappings:
        text: "$.content[0].text"
        model: "$.model"
        input_tokens: "$.usage.input_tokens"
        output_tokens: "$.usage.output_tokens"
        stop_reason: "$.stop_reason"

  test_connection:
    name: test_connection
    display_name: Test Connection
    description: Verify API key with a minimal request
    type: http

    method: POST
    url: "https://api.anthropic.com/v1/messages"
    headers:
      x-api-key: "{{auth.api_key}}"
      anthropic-version: "2023-06-01"
      Content-Type: "application/json"
    body:
      model: "claude-3-haiku-20240307"
      max_tokens: 10
      messages:
        - role: "user"
          content: "Hi"

    parameters: []

    response:
      mappings:
        model: "$.model"
        text: "$.content[0].text"

# Metadata
version: "1.0.0"
documentation_url: https://docs.anthropic.com
homepage_url: https://anthropic.com
is_enabled: true
supports_test_connection: true
