# Airtable Integration
# Spreadsheet-database hybrid for team collaboration

id: airtable
name: airtable
display_name: Airtable
description: Spreadsheet-database hybrid for organizing work and building apps
category: project_management
icon_url: https://www.airtable.com/favicon.ico
version: "1.0.0"
documentation_url: https://airtable.com/developers/web/api/introduction

auth:
  type: api_key
  fields:
    - name: api_key
      label: Personal Access Token
      type: password
      required: true
      help: |
        Create a personal access token:
        1. Go to https://airtable.com/create/tokens
        2. Click "Create new token"
        3. Add scopes: data.records:read, data.records:write, schema.bases:read
        4. Add the bases you want to access
        5. Copy the generated token

actions:
  # Base Actions
  list_bases:
    name: List Bases
    description: Get all bases accessible to the token
    type: http
    http:
      method: GET
      url: "https://api.airtable.com/v0/meta/bases"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
    parameters: []

  get_base_schema:
    name: Get Base Schema
    description: Get tables and fields in a base
    type: http
    http:
      method: GET
      url: "https://api.airtable.com/v0/meta/bases/{{parameters.base_id}}/tables"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
    parameters:
      - name: base_id
        label: Base ID
        type: string
        required: true
        placeholder: "appXXXXXXXXXXXXXX"

  # Record Actions
  list_records:
    name: List Records
    description: Get records from a table
    type: http
    http:
      method: GET
      url: "https://api.airtable.com/v0/{{parameters.base_id}}/{{parameters.table_name}}"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
      query_params:
        maxRecords: "{{parameters.max_records}}"
        view: "{{parameters.view}}"
        filterByFormula: "{{parameters.filter}}"
        sort[0][field]: "{{parameters.sort_field}}"
        sort[0][direction]: "{{parameters.sort_direction}}"
    parameters:
      - name: base_id
        label: Base ID
        type: string
        required: true
        placeholder: "appXXXXXXXXXXXXXX"
      - name: table_name
        label: Table Name
        type: string
        required: true
        description: Table name or ID
      - name: max_records
        label: Max Records
        type: integer
        required: false
        default: 100
      - name: view
        label: View
        type: string
        required: false
        description: View name or ID to filter by
      - name: filter
        label: Filter Formula
        type: string
        required: false
        placeholder: "{Status} = 'Active'"
        description: Airtable formula to filter records
      - name: sort_field
        label: Sort Field
        type: string
        required: false
      - name: sort_direction
        label: Sort Direction
        type: string
        required: false
        default: asc
        enum: [asc, desc]

  get_record:
    name: Get Record
    description: Get a specific record by ID
    type: http
    http:
      method: GET
      url: "https://api.airtable.com/v0/{{parameters.base_id}}/{{parameters.table_name}}/{{parameters.record_id}}"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
    parameters:
      - name: base_id
        label: Base ID
        type: string
        required: true
      - name: table_name
        label: Table Name
        type: string
        required: true
      - name: record_id
        label: Record ID
        type: string
        required: true
        placeholder: "recXXXXXXXXXXXXXX"

  create_record:
    name: Create Record
    description: Create a new record in a table
    type: http
    http:
      method: POST
      url: "https://api.airtable.com/v0/{{parameters.base_id}}/{{parameters.table_name}}"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Content-Type: application/json
      body:
        fields:
          Name: "{{parameters.name}}"
    parameters:
      - name: base_id
        label: Base ID
        type: string
        required: true
      - name: table_name
        label: Table Name
        type: string
        required: true
      - name: name
        label: Name
        type: string
        required: true
        description: Value for the Name field (primary field)

  create_records:
    name: Create Records (Batch)
    description: Create multiple records at once
    type: http
    http:
      method: POST
      url: "https://api.airtable.com/v0/{{parameters.base_id}}/{{parameters.table_name}}"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Content-Type: application/json
      body:
        records: "{{parameters.records}}"
    parameters:
      - name: base_id
        label: Base ID
        type: string
        required: true
      - name: table_name
        label: Table Name
        type: string
        required: true
      - name: records
        label: Records
        type: array
        required: true
        description: Array of records with fields objects

  update_record:
    name: Update Record
    description: Update an existing record
    type: http
    http:
      method: PATCH
      url: "https://api.airtable.com/v0/{{parameters.base_id}}/{{parameters.table_name}}/{{parameters.record_id}}"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Content-Type: application/json
      body:
        fields:
          Name: "{{parameters.name}}"
          Status: "{{parameters.status}}"
    parameters:
      - name: base_id
        label: Base ID
        type: string
        required: true
      - name: table_name
        label: Table Name
        type: string
        required: true
      - name: record_id
        label: Record ID
        type: string
        required: true
      - name: name
        label: Name
        type: string
        required: false
      - name: status
        label: Status
        type: string
        required: false

  delete_record:
    name: Delete Record
    description: Delete a record from a table
    type: http
    http:
      method: DELETE
      url: "https://api.airtable.com/v0/{{parameters.base_id}}/{{parameters.table_name}}/{{parameters.record_id}}"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
    parameters:
      - name: base_id
        label: Base ID
        type: string
        required: true
      - name: table_name
        label: Table Name
        type: string
        required: true
      - name: record_id
        label: Record ID
        type: string
        required: true

  # Search
  search_records:
    name: Search Records
    description: Search records using a filter formula
    type: http
    http:
      method: GET
      url: "https://api.airtable.com/v0/{{parameters.base_id}}/{{parameters.table_name}}"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
      query_params:
        filterByFormula: "SEARCH(LOWER(\"{{parameters.search_term}}\"), LOWER({{{parameters.search_field}}}))"
        maxRecords: "{{parameters.max_records}}"
    parameters:
      - name: base_id
        label: Base ID
        type: string
        required: true
      - name: table_name
        label: Table Name
        type: string
        required: true
      - name: search_term
        label: Search Term
        type: string
        required: true
      - name: search_field
        label: Field to Search
        type: string
        required: true
        default: "Name"
      - name: max_records
        label: Max Records
        type: integer
        required: false
        default: 10

  test_connection:
    name: Test Connection
    description: Verify Airtable credentials
    type: http
    http:
      method: GET
      url: "https://api.airtable.com/v0/meta/bases"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
    parameters: []
