# Notion Integration
# All-in-one workspace for notes, docs, and project management

id: notion
name: notion
display_name: Notion
description: All-in-one workspace for notes, docs, wikis, and project management
category: project_management
icon_url: https://www.notion.so/favicon.ico
version: "1.0.0"
documentation_url: https://developers.notion.com/reference

auth:
  type: api_key
  fields:
    - name: api_key
      label: Integration Token
      type: password
      required: true
      help: |
        Create an integration to get your token:
        1. Go to https://www.notion.so/my-integrations
        2. Click "New integration"
        3. Give it a name and select a workspace
        4. Copy the "Internal Integration Token"

        Note: You must share pages/databases with your integration for it to access them.

actions:
  # Database Actions
  list_databases:
    name: List Databases
    description: Search for databases the integration has access to
    type: http
    http:
      method: POST
      url: "https://api.notion.com/v1/search"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
        Content-Type: application/json
      body:
        filter:
          value: database
          property: object
        page_size: "{{parameters.page_size}}"
    parameters:
      - name: page_size
        label: Page Size
        type: integer
        required: false
        default: 10

  query_database:
    name: Query Database
    description: Query a database with optional filters
    type: http
    http:
      method: POST
      url: "https://api.notion.com/v1/databases/{{parameters.database_id}}/query"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
        Content-Type: application/json
      body:
        page_size: "{{parameters.page_size}}"
    parameters:
      - name: database_id
        label: Database ID
        type: string
        required: true
        description: The database ID (from the URL or API)
      - name: page_size
        label: Page Size
        type: integer
        required: false
        default: 10

  get_database:
    name: Get Database
    description: Get database schema and properties
    type: http
    http:
      method: GET
      url: "https://api.notion.com/v1/databases/{{parameters.database_id}}"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
    parameters:
      - name: database_id
        label: Database ID
        type: string
        required: true

  # Page Actions
  get_page:
    name: Get Page
    description: Get a page and its properties
    type: http
    http:
      method: GET
      url: "https://api.notion.com/v1/pages/{{parameters.page_id}}"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
    parameters:
      - name: page_id
        label: Page ID
        type: string
        required: true

  create_page:
    name: Create Page
    description: Create a new page in a database
    type: http
    http:
      method: POST
      url: "https://api.notion.com/v1/pages"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
        Content-Type: application/json
      body:
        parent:
          database_id: "{{parameters.database_id}}"
        properties:
          title:
            title:
              - text:
                  content: "{{parameters.title}}"
    parameters:
      - name: database_id
        label: Database ID
        type: string
        required: true
      - name: title
        label: Title
        type: string
        required: true

  update_page:
    name: Update Page
    description: Update page properties
    type: http
    http:
      method: PATCH
      url: "https://api.notion.com/v1/pages/{{parameters.page_id}}"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
        Content-Type: application/json
      body:
        archived: "{{parameters.archived}}"
    parameters:
      - name: page_id
        label: Page ID
        type: string
        required: true
      - name: archived
        label: Archived
        type: boolean
        required: false
        default: false

  archive_page:
    name: Archive Page
    description: Archive (soft-delete) a page
    type: http
    http:
      method: PATCH
      url: "https://api.notion.com/v1/pages/{{parameters.page_id}}"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
        Content-Type: application/json
      body:
        archived: true
    parameters:
      - name: page_id
        label: Page ID
        type: string
        required: true

  # Block Actions
  get_block_children:
    name: Get Block Children
    description: Get content blocks of a page or block
    type: http
    http:
      method: GET
      url: "https://api.notion.com/v1/blocks/{{parameters.block_id}}/children"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
      query_params:
        page_size: "{{parameters.page_size}}"
    parameters:
      - name: block_id
        label: Block/Page ID
        type: string
        required: true
      - name: page_size
        label: Page Size
        type: integer
        required: false
        default: 50

  append_block_children:
    name: Append Block Children
    description: Add content blocks to a page
    type: http
    http:
      method: PATCH
      url: "https://api.notion.com/v1/blocks/{{parameters.block_id}}/children"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
        Content-Type: application/json
      body:
        children:
          - object: block
            type: paragraph
            paragraph:
              rich_text:
                - type: text
                  text:
                    content: "{{parameters.content}}"
    parameters:
      - name: block_id
        label: Page/Block ID
        type: string
        required: true
      - name: content
        label: Content
        type: string
        required: true

  # Search
  search:
    name: Search
    description: Search across all pages and databases
    type: http
    http:
      method: POST
      url: "https://api.notion.com/v1/search"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
        Content-Type: application/json
      body:
        query: "{{parameters.query}}"
        page_size: "{{parameters.page_size}}"
    parameters:
      - name: query
        label: Search Query
        type: string
        required: true
      - name: page_size
        label: Page Size
        type: integer
        required: false
        default: 10

  # Users
  list_users:
    name: List Users
    description: Get all users in the workspace
    type: http
    http:
      method: GET
      url: "https://api.notion.com/v1/users"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
      query_params:
        page_size: "{{parameters.page_size}}"
    parameters:
      - name: page_size
        label: Page Size
        type: integer
        required: false
        default: 10

  get_me:
    name: Get Current User
    description: Get the bot user for this integration
    type: http
    http:
      method: GET
      url: "https://api.notion.com/v1/users/me"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
    parameters: []

  test_connection:
    name: Test Connection
    description: Verify Notion credentials
    type: http
    http:
      method: GET
      url: "https://api.notion.com/v1/users/me"
      headers:
        Authorization: "Bearer {{auth.api_key}}"
        Notion-Version: "2022-06-28"
    parameters: []
