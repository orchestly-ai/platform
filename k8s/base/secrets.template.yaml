# This is a template - DO NOT commit actual secrets to git
# Copy to secrets.yaml and fill in actual values
# Run: kubectl create secret generic agent-orchestrator-secrets --from-env-file=.env

apiVersion: v1
kind: Secret
metadata:
  name: agent-orchestrator-secrets
  labels:
    app: agent-orchestrator
type: Opaque
stringData:
  # Database
  postgres_user: "postgres"
  postgres_password: "CHANGE_ME_IN_PRODUCTION"

  # JWT
  jwt_secret_key: "CHANGE_ME_MINIMUM_32_CHARACTERS_LONG"

  # LLM Providers
  openai_api_key: "sk-..."
  anthropic_api_key: "sk-ant-..."

  # Observability (Optional)
  sentry_dsn: ""
  datadog_api_key: ""
