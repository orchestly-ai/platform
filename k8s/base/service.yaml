apiVersion: v1
kind: Service
metadata:
  name: agent-orchestrator-api
  labels:
    app: agent-orchestrator
    component: api
spec:
  type: ClusterIP
  selector:
    app: agent-orchestrator
    component: api
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: agent-orchestrator-dashboard
  labels:
    app: agent-orchestrator
    component: dashboard
spec:
  type: ClusterIP
  selector:
    app: agent-orchestrator
    component: dashboard
  ports:
  - name: http
    port: 3000
    targetPort: http
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: agent-orchestrator
    component: database
spec:
  type: ClusterIP
  selector:
    app: agent-orchestrator
    component: postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: agent-orchestrator
    component: cache
spec:
  type: ClusterIP
  selector:
    app: agent-orchestrator
    component: redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
