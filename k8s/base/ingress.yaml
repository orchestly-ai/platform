apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-orchestrator-ingress
  labels:
    app: agent-orchestrator
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,X-API-Key"
spec:
  tls:
  - hosts:
    - agent-orchestrator.example.com
    - api.agent-orchestrator.example.com
    - dashboard.agent-orchestrator.example.com
    secretName: agent-orchestrator-tls
  rules:
  - host: api.agent-orchestrator.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agent-orchestrator-api
            port:
              number: 8000
  - host: dashboard.agent-orchestrator.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agent-orchestrator-dashboard
            port:
              number: 3000
  - host: agent-orchestrator.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: agent-orchestrator-api
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agent-orchestrator-dashboard
            port:
              number: 3000
