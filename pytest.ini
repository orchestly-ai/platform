[pytest]
testpaths =
    backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignore outdated platform tests that need updating
# NOTE: tests/ directory contains legacy tests that don't match current API
# The backend/tests/ directory contains the up-to-date test suite (998 tests)
# Integration and load tests require actual infrastructure (database, redis)
collect_ignore_glob =
    tests/test_workflow_execution.py
    tests/unit/test_api.py
    tests/unit/test_registry.py
    tests/unit/test_queue.py
    tests/unit/test_agent_client.py
    tests/integration/*
    tests/load/*
    backend/tests/integration/*
    backend/tests/load/*

# Output options
# Note: Coverage options can be added with: pytest --cov=sdk --cov=backend
addopts =
    -v
    --tb=short
    --ignore=backend/tests/integration
    --ignore=backend/tests/load

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    asyncio: Async tests

# Async configuration
# Note: asyncio_mode = auto requires pytest-asyncio to be installed
# asyncio_mode = auto

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::pytest.PytestConfigWarning
